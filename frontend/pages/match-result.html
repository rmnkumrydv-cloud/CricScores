<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Result - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --gold: #FFD700;
            --success: #00E676;
        }

        .result-container {
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .winner-banner {
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: var(--primary-color);
            margin: 15px 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .innings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin: 30px 0 15px;
            border-left: 5px solid var(--success);
        }

        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .scorecard-table th {
            text-align: left;
            padding: 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .scorecard-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--gold);
        }

        .pom-section {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid var(--gold);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-content container">
            <a href="../dashboard.html" class="logo">Cric<span>Scores</span></a>
            <div class="nav-links">
                <a href="../dashboard.html">Dashboard</a>
            </button>
        </div>
    </nav>

    <main class="container animate-fade">
        <div class="result-container" id="mainLoader">
            <h4 style="color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px;">Match Conclusion</h4>
            <div class="winner-banner" id="winnerName">Loading Result...</div>
            <p id="resultDetail" style="color: var(--text-secondary); font-size: 1.2rem;"></p>

            <div id="pomSection" class="pom-section">
                <div style="color: var(--gold); font-size: 0.8rem; font-weight: 800; letter-spacing: 1px;">🌟 PLAYER OF THE MATCH</div>
                <div id="pomName" style="font-size: 1.8rem; font-weight: 800; color: #fff;"></div>
            </div>

            <div id="pomSelectContainer" style="display: none; margin: 20px 0;">
                <button onclick="openPOMModal()" class="btn" style="border: 2px solid var(--gold); color: var(--gold); background: transparent;">
                    Nominate MVP
                </button>
            </div>

            <div id="scorecards"></div>

            <a href="../dashboard.html" class="btn btn-primary" style="margin-top: 30px;">Return to Dashboard</a>
        </div>
    </main>

    <div id="pomModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--gold); margin-bottom: 20px;">Nominate Player</h3>
            <select id="pomPlayerSelect" class="form-control" style="width: 100%; padding: 12px; margin-bottom: 20px; background: #333; color: white; border: none; border-radius: 8px;">
            </select>
            <div style="display: flex; gap: 10px;">
                <button onclick="submitPOM()" class="btn btn-primary" style="flex: 1;">Submit</button>
                <button onclick="closePOMModal()" class="btn btn-secondary" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('id');

        async function loadResult() {
            try {
                const match = await fetchAPI(`/matches/${matchId}`);
                window.currentMatch = match;

                // 1. UI: Result Banner
                document.getElementById('winnerName').textContent = match.winner 
                    ? `${match.winner.name.toUpperCase()} WINS!` 
                    : "MATCH TIED";
                document.getElementById('resultDetail').textContent = match.result || '';

                // 2. UI: Player of the Match
                const pomSection = document.getElementById('pomSection');
                const pomSelectContainer = document.getElementById('pomSelectContainer');
                
                if (match.playerOfTheMatch) {
                    pomSection.style.display = 'block';
                    document.getElementById('pomName').textContent = match.playerOfTheMatch.name;
                    pomSelectContainer.style.display = 'none';
                } else {
                    const user = JSON.parse(localStorage.getItem('user'));
                    if (user && match.createdBy === user.id) pomSelectContainer.style.display = 'block';
                }

                // 3. UI: Scorecards
                const scorecardsContainer = document.getElementById('scorecards');
                scorecardsContainer.innerHTML = '';

                match.innings.forEach((inn, idx) => {
                    const section = document.createElement('div');
                    section.innerHTML = `
                        <div class="innings-header">
                            <h3 style="margin:0">${inn.battingTeam.name}</h3>
                            <h3 style="margin:0">${inn.runs}/${inn.wickets} <small style="font-size:0.6em; opacity:0.7">(${inn.overs} ov)</small></h3>
                        </div>
                        <table class="scorecard-table">
                            <thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
                            <tbody id="batting-${idx}"></tbody>
                        </table>
                        <table class="scorecard-table">
                            <thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr></thead>
                            <tbody id="bowling-${idx}"></tbody>
                        </table>
                    `;
                    scorecardsContainer.appendChild(section);
                    renderInningsRows(inn, idx);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('winnerName').textContent = "Error Loading Match";
            }
        }

        function renderInningsRows(innings, idx) {
            const batBody = document.getElementById(`batting-${idx}`);
            const bowlBody = document.getElementById(`bowling-${idx}`);

            innings.battingStats.forEach(b => {
                const sr = b.balls > 0 ? ((b.runs / b.balls) * 100).toFixed(1) : '0.0';
                let dismissal = b.isOut ? (b.dismissalType || 'Out') : 'not out';
                
                batBody.innerHTML += `
                    <tr>
                        <td><strong>${b.player?.name || 'Unknown'}</strong><br><small style="color:var(--text-secondary)">${dismissal}</small></td>
                        <td><strong>${b.runs}</strong></td>
                        <td>${b.balls}</td>
                        <td>${b.fours}</td>
                        <td>${b.sixes}</td>
                        <td style="color:var(--primary-color)">${sr}</td>
                    </tr>`;
            });

            innings.bowlingStats.forEach(bl => {
                const econ = bl.overs > 0 ? (bl.runsConceded / bl.overs).toFixed(1) : '0.0';
                bowlBody.innerHTML += `
                    <tr>
                        <td>${bl.player?.name || 'Unknown'}</td>
                        <td>${bl.overs}</td>
                        <td>${bl.maidens}</td>
                        <td>${bl.runsConceded}</td>
                        <td style="color:var(--success)"><strong>${bl.wickets}</strong></td>
                        <td>${econ}</td>
                    </tr>`;
            });
        }

        function openPOMModal() {
            const select = document.getElementById('pomPlayerSelect');
            const m = window.currentMatch;
            const players = [...(m.playingXI1 || []), ...(m.playingXI2 || [])];
            
            select.innerHTML = players.map(p => `<option value="${p._id || p}">${p.name || 'Player'}</option>`).join('');
            document.getElementById('pomModal').style.display = 'block';
        }

        function closePOMModal() { document.getElementById('pomModal').style.display = 'none'; }

        async function submitPOM() {
            const playerId = document.getElementById('pomPlayerSelect').value;
            try {
                await fetchAPI(`/matches/${matchId}/pom`, { method: 'PUT', body: JSON.stringify({ playerId }) });
                closePOMModal();
                loadResult();
            } catch (err) { alert(err.message); }
        }

        loadResult();
    </script>
</body>
</html>
