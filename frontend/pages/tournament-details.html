<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Details - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="../index.html">CricScores</a></div>
        <div class="nav-links">
            <a href="tournaments.html">My Tournaments</a>
            <a href="../dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container animate-fade" style="margin-top: 40px; position: relative;">
        <a href="tournaments.html" class="back-btn" title="Back to Tournaments" style="position: absolute; left: -50px; top: 0;">&#8592;</a>
        <div id="tournamentHeader" class="glass" style="margin-bottom: 30px; padding: 30px; border-radius: 20px;">
            <p>Loading...</p>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 30px; align-items: center;">
            <button class="btn btn-primary" onclick="showTab('teams')">Teams</button>
            <button class="btn btn-secondary" onclick="showTab('fixtures')">Fixtures</button>
            <button class="btn btn-secondary" onclick="showTab('standings')">Standings</button>
            <div style="flex-grow: 1;"></div>
            <button id="deleteTournamentBtn" class="btn" style="background: var(--error-color); color: white; display: none;">Delete Tournament</button>
        </div>

        <!-- Teams Tab -->
        <div id="teamsTab">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Participating Teams</h3>
                <button id="addTeamBtn" class="btn btn-primary">Add Team</button>
            </div>

            <div id="addTeamFormContainer" class="form-container glass"
                style="display: none; margin: 0 auto 40px auto; max-width: 600px; border-radius: 20px;">
                <h3 style="margin-bottom: 20px; color: var(--primary-color); font-weight: 700;">Add Team to Tournament
                </h3>
                <form id="addTeamForm">
                    <div class="form-group">
                        <label for="teamSelect">Select Team</label>
                        <select id="teamSelect" required
                            style="width: 100%; padding: 10px; background: #2C2C2C; color: white; border: 1px solid #333; border-radius: 5px;">
                            <option value="">Loading teams...</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">Add</button>
                        <button type="button" id="cancelTeamBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>

            <div id="teamsList" class="dashboard-grid">
                <!-- Teams loaded here -->
            </div>
        </div>

        <!-- Fixtures Tab -->
        <div id="fixturesTab" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Fixtures & Results</h3>
                <button id="createMatchBtn" class="btn btn-primary">Create Match</button>
            </div>

            <div id="createMatchFormContainer" class="form-container glass"
                style="display: none; margin: 0 auto 40px auto; max-width: 600px; border-radius: 20px;">
                <h3 style="margin-bottom: 20px; color: var(--primary-color); font-weight: 700;">Schedule Match</h3>
                <form id="createMatchForm">
                    <div class="form-group">
                        <label for="team1Select">Team 1</label>
                        <select id="team1Select" required
                            style="width: 100%; padding: 10px; background: #2C2C2C; color: white; border: 1px solid #333; border-radius: 5px;">
                            <option value="">Select Team 1</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="team2Select">Team 2</label>
                        <select id="team2Select" required
                            style="width: 100%; padding: 10px; background: #2C2C2C; color: white; border: 1px solid #333; border-radius: 5px;">
                            <option value="">Select Team 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="matchDate">Date</label>
                        <input type="datetime-local" id="matchDate" required>
                    </div>
                    <div class="form-group">
                        <label for="venue">Venue</label>
                        <input type="text" id="venue" required>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">Schedule</button>
                        <button type="button" id="cancelMatchBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>

            <div id="fixturesList">
                <!-- Matches loaded here -->
            </div>
        </div>

        <!-- Standings Tab -->
        <div id="standingsTab" style="display: none;">
            <h3 style="margin-bottom: 20px;">Points Table</h3>
            <div class="card glass" style="padding: 0; overflow-x: auto; border-radius: 20px;">
                <table class="scorecard-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="background: #333; color: #aaa;">
                            <th style="padding: 15px;">Team</th>
                            <th>P</th>
                            <th>W</th>
                            <th>L</th>
                            <th>T</th>
                            <th>Pts</th>
                            <th>NRR</th>
                        </tr>
                    </thead>
                    <tbody id="standingsBody">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="../js/api.js"></script>
    <script src="../js/tournament-details.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }

        function showTab(tabName) {
            document.getElementById('teamsTab').style.display = 'none';
            document.getElementById('fixturesTab').style.display = 'none';
            document.getElementById('standingsTab').style.display = 'none';

            document.getElementById(tabName + 'Tab').style.display = 'block';

            if (tabName === 'standings') {
                loadStandings();
            } else if (tabName === 'fixtures') {
                loadFixtures();
            }
        }
    </script>
</body>

</html>
