<!DOCTYPE html>
<html lang="en">
    

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toss - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .toss-container {
            max-width: 600px;
            margin: 60px auto;
            text-align: center;
            background: var(--background-card);
            padding: 50px;
            border-radius: 32px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .toss-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
        }

        .coin-box {
            perspective: 1000px;
            width: 180px;
            height: 180px;
            margin: 40px auto;
            cursor: pointer;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .coin .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: 900;
            border: 12px solid #ffd700;
            background: radial-gradient(circle at 30% 30%, #f1c40f, #d35400);
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.4);
        }

        .coin .tails {
            transform: rotateY(180deg);
            background: radial-gradient(circle at 30% 30%, #e67e22, #a04000);
            border-color: #e67e22;
        }

        .spinning {
            animation: spin-animation 3s infinite linear;
        }

        @keyframes spin-animation {
            from {
                transform: rotateY(0);
            }

            to {
                transform: rotateY(360deg);
            }
        }

        .btn-decision {
            display: none;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-decision button {
            padding: 15px 35px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1em;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-decision button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-bat {
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary-color);
            border: 1px solid rgba(16, 185, 129, 0.3) !important;
        }

        .btn-bat:hover:not(:disabled) {
            background: rgba(16, 185, 129, 0.2);
            transform: scale(1.05);
        }

        .btn-bowl {
            background: rgba(59, 130, 246, 0.1);
            color: var(--secondary-color);
            border: 1px solid rgba(59, 130, 246, 0.3) !important;
        }

        .btn-bowl:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.2);
            transform: scale(1.05);
        }

        #tossResult {
            margin: 25px 0;
            font-size: 1.8em;
            color: #00E676;
            font-weight: 800;
            opacity: 0;
            transition: 0.8s;
            transform: scale(0.9);
        }

        #tossResult.show {
            opacity: 1;
            transform: scale(1);
        }

        #matchTitle {
            font-size: 2.8em;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #tossIntro {
            color: #aaa;
            font-size: 1.1em;
        }
    </style>
    <script src="../js/theme.js"></script>
</head>

<body>
    <div class="toss-container">
        <h1 id="matchTitle">Match Toss</h1>
        <p id="tossIntro">Click the coin to flip</p>

        <div class="coin-box" id="coinBox">
            <div class="coin" id="coin">
                <div class="side heads">H</div>
                <div class="side tails">T</div>
            </div>
        </div>

        <div id="tossResult">Team wins the Toss!</div>

        <div class="btn-decision" id="decisionBox">
            <button class="btn-bat" onclick="makeDecision('Bat')">Batting First</button>
            <button class="btn-bowl" onclick="makeDecision('Bowl')">Bowling First</button>
        </div>

        <p id="finalLoading" style="display:none; color: #aaa; margin-top:20px; font-style: italic;">Setting up match...
        </p>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/toss.js"></script>
</body>

</html>
