<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="dark-mode" style="background: radial-gradient(circle at bottom left, #0a101f 0%, #080c14 100%); overflow-x: hidden;">
    <div class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0; position: relative;">
        <!-- Decorative Elements -->
        <div style="position: absolute; top: -100px; left: -100px; width: 300px; height: 300px; background: var(--primary-color); filter: blur(150px); opacity: 0.1;"></div>
        <div style="position: absolute; bottom: -100px; right: -100px; width: 300px; height: 300px; background: var(--secondary-color); filter: blur(150px); opacity: 0.1;"></div>

        <div class="form-container glass animate-fade" style="position: relative; border-radius: 24px; padding: 40px; border: 1px solid rgba(255,255,255,0.05); max-width: 500px; width: 90%;">
            <a href="../index.html" class="back-btn" title="Back to Home" style="top: 25px; left: 25px;">←</a>
            <div style="text-align: center; margin-bottom: 25px;">
                <h2 style="font-weight: 900; font-size: 2.2rem; letter-spacing: -1.5px; margin-bottom: 5px;">Join <span>CricScores</span></h2>
                <p style="color: var(--text-secondary); font-size: 0.85rem;">Start your professional cricket journey today.</p>
            </div>
            
            <div class="tab-container" style="display: flex; margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                <button class="tab-btn active" id="playerTab" style="flex: 1; background: var(--primary-color); border: none; color: #000; padding: 10px; cursor: pointer; font-weight: 800; border-radius: 8px; font-size: 0.85rem; transition: var(--transition);">Player</button>
                <button class="tab-btn" id="umpireTab" style="flex: 1; background: none; border: none; color: var(--text-secondary); padding: 10px; cursor: pointer; font-weight: 700; border-radius: 8px; font-size: 0.85rem; transition: var(--transition);">Umpire</button>
            </div>

            <div id="message" class="message" style="display: none;"></div>
            <form id="registerForm">
                <input type="hidden" id="role" value="player">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                


                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <div class="form-group" id="umpireCodeGroup" style="display: none;">
                    <label for="signupCode">Umpire Signup Code</label>
                    <input type="password" id="signupCode" placeholder="Required for Umpires">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <p style="margin-top: 20px; text-align: center; color: var(--text-secondary);">
                Already have an account? <a href="login.html" style="color: var(--primary-color);">Login</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const playerTab = document.getElementById('playerTab');
        const umpireTab = document.getElementById('umpireTab');
        const roleInput = document.getElementById('role');
        const umpireCodeGroup = document.getElementById('umpireCodeGroup');

        // Tab Switching Logic
        playerTab.addEventListener('click', () => {
            playerTab.style.background = 'var(--primary-color)';
            playerTab.style.color = '#000';
            playerTab.style.fontWeight = '800';
            
            umpireTab.style.background = 'none';
            umpireTab.style.color = 'var(--text-secondary)';
            umpireTab.style.fontWeight = '700';
            
            roleInput.value = 'player';
            umpireCodeGroup.style.display = 'none';
            document.getElementById('signupCode').required = false;
        });

        umpireTab.addEventListener('click', () => {
            umpireTab.style.background = 'var(--secondary-color)';
            umpireTab.style.color = '#000';
            umpireTab.style.fontWeight = '800';
            
            playerTab.style.background = 'none';
            playerTab.style.color = 'var(--text-secondary)';
            playerTab.style.fontWeight = '700';
            
            roleInput.value = 'umpire';
            umpireCodeGroup.style.display = 'block';
            document.getElementById('signupCode').required = true;
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = roleInput.value;
            const signupCode = document.getElementById('signupCode').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            try {
                const data = await fetchAPI('/users', {
                    method: 'POST',
                    body: JSON.stringify({ name, username, email, password, role, signupCode })
                });

                saveUser(data);
                if (data.role === 'umpire') {
                    window.location.href = '../umpire-dashboard.html';
                } else {
                    window.location.href = '../dashboard.html';
                }
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        function showMessage(msg, type) {
            messageDiv.style.display = 'block';
            messageDiv.textContent = msg;
            messageDiv.className = `message message-${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>

</html>
