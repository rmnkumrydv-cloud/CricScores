<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Teams - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="../index.html">CricScores</a></div>
        <div class="nav-links">
            <a href="../dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container animate-fade" style="margin-top: 40px; position: relative;">
        <a href="../dashboard.html" class="back-btn" title="Back to Dashboard" style="position: absolute; left: -50px; top: 0;">&#8592;</a>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px;">
            <h2 style="font-weight: 800; font-size: 2.2rem; letter-spacing: -1px;">My Teams</h2>
            <button id="createTeamBtn" class="btn btn-primary" style="padding: 12px 25px; border-radius: 10px; display: none;">Create
                New Team</button>
        </div>

        <!-- Create Team Form (Hidden by default) -->
        <div id="createTeamFormContainer" class="form-container glass"
            style="display: none; margin: 0 auto 40px auto; max-width: 600px; border-radius: 20px;">
            <h3 style="margin-bottom: 20px; color: var(--primary-color); font-weight: 700;">Create Team</h3>
            <form id="createTeamForm">
                <div class="form-group">
                    <label for="teamName">Team Name</label>
                    <input type="text" id="teamName" required>
                </div>
                <div class="form-group">
                    <label for="teamCity">City / Location</label>
                    <input type="text" id="teamCity">
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label>Add Players (Optional)</label>
                    <input type="text" id="playerSearch" placeholder="Search verified players by name or @username" style="margin-bottom: 5px;" autocomplete="off">
                    <div id="searchResults" style="max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 8px; z-index: 10;"></div>
                    
                    <div id="selectedPlayersContainer" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;">
                        <!-- Selected player chips will appear here -->
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save Team</button>
                    <button type="button" id="cancelCreateBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>

        <div id="teamsGrid" class="dashboard-grid">
            <!-- Teams will be loaded here -->
            <p style="color: var(--text-secondary);">Loading teams...</p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/teams.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
