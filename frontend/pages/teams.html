<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Teams - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="../index.html">CricScores</a></div>
        <div class="nav-links">
            <a href="../dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="border-bottom: 2px solid var(--primary-color); padding-bottom: 10px;">My Teams</h2>
            <button id="createTeamBtn" class="btn btn-primary">Create New Team</button>
        </div>

        <!-- Create Team Form (Hidden by default) -->
        <div id="createTeamFormContainer" class="form-container"
            style="display: none; margin: 0 auto 40px auto; max-width: 600px;">
            <h3 style="margin-bottom: 20px; color: var(--primary-color);">Create Team</h3>
            <form id="createTeamForm">
                <div class="form-group">
                    <label for="teamName">Team Name</label>
                    <input type="text" id="teamName" required>
                </div>
                <div class="form-group">
                    <label for="teamCity">City / Location</label>
                    <input type="text" id="teamCity">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Save Team</button>
                    <button type="button" id="cancelCreateBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>

        <div id="teamsGrid" class="dashboard-grid">
            <!-- Teams will be loaded here -->
            <p style="color: var(--text-secondary);">Loading teams...</p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/teams.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
