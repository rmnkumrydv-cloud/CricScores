<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px; color: var(--primary-color);">Login</h2>
            <div id="message" class="message" style="display: none;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="margin-top: 20px; text-align: center; color: var(--text-secondary);">
                Don't have an account? <a href="register.html" style="color: var(--primary-color);">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        const loginForm = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.href = '../dashboard.html';
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        function showMessage(msg, type) {
            messageDiv.style.display = 'block';
            messageDiv.textContent = msg;
            messageDiv.className = `message message-${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>

</html>
