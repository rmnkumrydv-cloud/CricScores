<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboards - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .leaderboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 500px), 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .leaderboard-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease;
        }

        .leaderboard-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: 15px;
        }

        .leaderboard-table th {
            text-align: left;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0 12px 10px;
            opacity: 0.6;
        }

        .leaderboard-table tr td {
            background: rgba(255, 255, 255, 0.02);
            padding: 16px 12px;
            transition: background 0.2s ease;
        }

        .leaderboard-table tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        .leaderboard-table td:first-child { border-radius: 12px 0 0 12px; }
        .leaderboard-table td:last-child { border-radius: 0 12px 12px 0; }

        .rank {
            font-weight: 800;
            font-size: 1.1rem;
            width: 50px;
        }

        /* Top 3 rank highlights */
        .rank-1 { color: #ffd700; } /* Gold */
        .rank-2 { color: #c0c0c0; } /* Silver */
        .rank-3 { color: #cd7f32; } /* Bronze */

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-highlight {
            font-weight: 800;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-content container">
            <a href="../index.html" class="logo">Cric<span>Scores</span></a>
            <div class="nav-links">
                <a href="../dashboard.html">Dashboard</a>
                <a href="leaderboards.html" class="active">Leaderboard</a>
                <div id="navProfile" class="user-profile" style="display: none;" onclick="location.href='profile.html'">
                    <img id="navProfilePic" src="" alt="">
                    <span id="navUserName"></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container animate-fade" style="margin-top: 40px;">
        <header style="display: flex; align-items: center; gap: 20px; margin-bottom: 40px;">
            <a href="../dashboard.html" class="btn-icon" aria-label="Back to Dashboard">←</a>
            <h1 style="font-weight: 800; font-size: clamp(1.8rem, 5vw, 2.5rem); margin: 0; letter-spacing: -1.5px;">Global <span style="color: var(--primary-color);">Leaderboards</span></h1>
        </header>

        <section class="leaderboard-grid">
            <div class="leaderboard-card">
                <h3 style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                    <span style="font-size: 1.6rem;">🏏</span> Batting Giants
                </h3>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Player</th>
                            <th>Runs</th>
                            <th>Avg.</th>
                        </tr>
                    </thead>
                    <tbody id="battingLeaderboard">
                        <tr><td colspan="4" class="empty-state">Syncing stats...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="leaderboard-card">
                <h3 style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                    <span style="font-size: 1.6rem;">Bowling Masters</span>
                </h3>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Player</th>
                            <th>Wkts</th>
                            <th>Econ.</th>
                        </tr>
                    </thead>
                    <tbody id="bowlingLeaderboard">
                        <tr><td colspan="4" class="empty-state">Syncing stats...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../js/api.js"></script>
    <script>
        async function loadLeaderboards() {
            // Setup Nav
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('navProfile').style.display = 'flex';
                document.getElementById('navUserName').textContent = user.name || user.username;
                document.getElementById('navProfilePic').src = user.profilePic || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random`;
            }

            try {
                const [batters, bowlers] = await Promise.all([
                    fetchAPI('/leaderboard/batting').catch(() => []),
                    fetchAPI('/leaderboard/bowling').catch(() => [])
                ]);

                renderTable('battingLeaderboard', batters, true);
                renderTable('bowlingLeaderboard', bowlers, false);
            } catch (err) {
                console.error('Leaderboard load failed:', err);
            }
        }

        /**
         * Generic render function to handle both tables
         */
        function renderTable(elementId, data, isBatting) {
            const body = document.getElementById(elementId);
            if (!data || data.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="empty-state">No rankings recorded yet</td></tr>`;
                return;
            }

            const fragment = document.createDocumentFragment();

            data.slice(0, 10).forEach((item, index) => {
                const tr = document.createElement('tr');
                const rank = index + 1;
                
                // Statistical Logic
                const mainStat = isBatting ? item.totalRuns : item.totalWickets;
                const matchesCount = item.matches?.length || 1;
                const secondaryStat = isBatting 
                    ? (item.totalRuns / matchesCount).toFixed(1) 
                    : (item.totalRunsConceded / (item.totalOvers || 1)).toFixed(2);

                tr.innerHTML = `
                    <td class="rank rank-${rank <= 3 ? rank : 'default'}">${rank}</td>
                    <td>
                        <div class="player-info">
                            <span class="player-name">${item.playerInfo?.name || 'Unknown Player'}</span>
                        </div>
                    </td>
                    <td class="stat-highlight">${mainStat}</td>
                    <td style="opacity: 0.8; font-family: monospace;">${secondaryStat}</td>
                `;
                fragment.appendChild(tr);
            });

            body.innerHTML = '';
            body.appendChild(fragment);
        }

        loadLeaderboards();
    </script>
</body>
</html>
