<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .profile-tags {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag-role {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .tag-batting {
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .tag-bowling {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--background-card);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-primary);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }
    </style>
    <script src="../js/theme.js"></script>
</head>

<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-content container">
            <a href="../index.html" class="logo">Cric<span>Scores</span></a>
            <div class="nav-links">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme" style="background:transparent;border:none;color:var(--text-primary);cursor:pointer;padding:5px;display:flex;align-items:center;transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 50%; opacity: 0.8;"></button>
                <a href="../dashboard.html">Dashboard</a>
                <a href="leaderboards.html">Leaderboard</a>
            </div>
        </div>
    </nav>

    <div class="container animate-fade" style="margin-top: 40px; padding-bottom: 60px;">
        <a href="javascript:history.back()" class="back-btn" title="Go Back" style="position: relative; left: 0; top: 0; margin-bottom: 20px; display: inline-block;">←</a>
        
        <div id="profileContent" style="display: none;">
            <div class="profile-header">
                <img id="playerPic" src="" alt="Profile Picture" class="profile-img">
                <div class="profile-info">
                    <h1 id="playerName">Loading...</h1>
                    <div style="color: var(--text-secondary); font-size: 1.1rem;">@<span id="playerUsername">username</span></div>
                    <div class="profile-tags">
                        <span class="tag tag-role" id="playerRole">Role</span>
                        <span class="tag tag-batting" id="playerBattingStyle">Batting Style</span>
                        <span class="tag tag-bowling" id="playerBowlingStyle">Bowling Style</span>
                    </div>
                </div>
            </div>

            <div class="stats-container">
                <h3 class="section-title">Career Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-card-title">Mat</div>
                        <div class="stat-card-value" id="matchesPlayed">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">Runs</div>
                        <div class="stat-card-value" id="totalRuns">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">Avg</div>
                        <div class="stat-card-value" id="battingAvg">0.0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">SR</div>
                        <div class="stat-card-value" id="battingSR">0.0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">4s / 6s</div>
                        <div class="stat-card-value"><span id="fours">0</span> / <span id="sixes">0</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">Wkts</div>
                        <div class="stat-card-value" id="totalWickets">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">Overs</div>
                        <div class="stat-card-value" id="oversBowled">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-title">Econ</div>
                        <div class="stat-card-value" id="bowlingEcon">0.0</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="loadingMessage" style="text-align: center; padding: 40px; color: var(--text-secondary);">
            Loading player data...
        </div>
        <div id="errorMessage" style="display: none; text-align: center; padding: 40px; color: var(--error-color);">
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/player-profile.js"></script>
</body>

</html>
