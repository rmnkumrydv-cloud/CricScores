<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umpire Mode - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .scoreboard-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .main-board {
            background: var(--background-card);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .main-board::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
        }

        .score-display {
            font-size: 6rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 10px 0;
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: var(--background-card);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .field-players {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            text-align: left;
            position: relative;
            transition: var(--transition);
        }

        .player-card.active {
            border-color: var(--primary-color);
            background: rgba(16, 185, 129, 0.08);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .player-card.active::after {
            content: '🏏';
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 1.2em;
        }

        .player-role {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .scoring-controls {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 32px;
        }

        .control-btn {
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            background: var(--glass-bg);
            color: var(--text-primary);
        }

        .control-btn:hover:not(:disabled) {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-secondary);
        }

        .btn-boundary {
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary-color);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .btn-six {
            background: rgba(59, 130, 246, 0.15);
            color: var(--secondary-color);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .btn-extra {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .btn-wicket {
            background: rgba(244, 63, 94, 0.15);
            color: var(--accent-red);
            border-color: rgba(244, 63, 94, 0.3);
            grid-column: span 2;
        }

        .win-prob-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .win-prob-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .last-ball {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            font-size: 0.95rem;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .btn-setup {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            background: var(--primary-color);
            color: #000;
            transition: var(--transition);
        }

        .btn-setup:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        /* Player Selection Tiles */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .player-tile {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .player-tile:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-secondary);
            transform: translateY(-2px);
        }

        .player-tile.selected {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .player-tile .tile-name {
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .player-tile .tile-role {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container animate-fade">
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 30px 0;">
            <div id="matchHeader" style="font-weight: 600; color: var(--text-secondary); font-size: 1.1rem;">Loading
                Match Details...</div>
            <div id="winProbBox" class="glass" style="padding: 12px 24px; border-radius: 40px;">
                Win Prob: <span id="winProb" style="color: var(--primary-color); font-weight: 800;">50%</span>
                <div class="win-prob-container">
                    <div class="win-prob-bar" id="winProbBar" style="width: 50%;"></div>
                </div>
            </div>
        </header>

        <div class="scoreboard-container">
            <div class="main-board glass">
                <h2 id="battingTeam" style="text-transform: uppercase; letter-spacing: 2px;">Team</h2>
                <div class="score-display">
                    <span id="score">0</span>/<span id="wickets">0</span>
                </div>
                <div style="color: #888; font-weight: bold;">
                    Overs: <span id="overs" style="color: #fff; font-size: 1.2em;">0.0</span>
                </div>

                <div class="field-players">
                    <div class="player-card active" id="strikerCard" onclick="promptNewBatsman('striker')"
                        style="cursor: pointer;">
                        <span class="player-role">Striker</span>
                        <span class="player-name" id="strikerName">Select...</span>
                    </div>
                    <div class="player-card" id="nonStrikerCard" onclick="promptNewBatsman('nonStriker')"
                        style="cursor: pointer;">
                        <span class="player-role">Non-Striker</span>
                        <span class="player-name" id="nonStrikerName">Select...</span>
                    </div>
                    <div class="player-card" id="bowlerCard" style="grid-column: span 2; cursor: pointer;"
                        onclick="promptNewBowler()">
                        <span class="player-role">Bowler</span>
                        <span class="player-name" id="bowlerName">Select...</span>
                    </div>
                </div>

                <div class="last-ball" id="lastBallInfo">
                    Last Ball: <span id="lastBallDetail" style="font-weight: 800; color: #00E676;">-</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box glass">
                    <div class="stat-label">CRR</div>
                    <div class="stat-value" id="crr">0.00</div>
                </div>
                <div class="stat-box glass">
                    <div class="stat-label" id="projLabel">Proj. Score</div>
                    <div class="stat-value" id="projScore">0</div>
                </div>
                <div class="stat-box glass">
                    <div class="stat-label">Target</div>
                    <div class="stat-value" id="target">-</div>
                </div>
                <div class="stat-box glass">
                    <div class="stat-label">RRR</div>
                    <div class="stat-value" id="rrr">-</div>
                </div>
            </div>
        </div>

        <div class="scoring-controls">
            <button class="control-btn" id="btn0" onclick="handleBall(0)">0</button>
            <button class="control-btn" id="btn1" onclick="handleBall(1)">1</button>
            <button class="control-btn" id="btn2" onclick="handleBall(2)">2</button>
            <button class="control-btn" id="btn3" onclick="handleBall(3)">3</button>
            <button class="control-btn btn-boundary" onclick="handleBall(4)">4s</button>
            <button class="control-btn btn-six" onclick="handleBall(6)">6s</button>
            <button class="control-btn btn-extra" onclick="handleExtra('Wide')">WD</button>
            <button class="control-btn btn-extra" onclick="handleExtra('NoBall')">NB</button>
            <button class="control-btn btn-extra" onclick="handleExtra('Bye')">BYE</button>
            <button class="control-btn btn-extra" onclick="handleExtra('LegBye')">LB</button>
            <button class="control-btn btn-wicket" onclick="openWicketModal()">WICKET</button>
            <button class="control-btn"
                style="grid-column: span 6; background: rgba(255,255,255,0.05); font-size: 1rem; padding: 12px; margin-top: 10px; border-color: rgba(255,255,255,0.1);"
                onclick="undoLastBall()">↺ REVERT DECISION (UNDO)</button>
        </div>
    </div>

    <!-- Selection Modal -->
    <div id="selectionModal" class="modal">
        <div class="modal-content glass" style="max-width: 600px; border-radius: 24px; padding: 35px;">
            <h2 id="selectionTitle" style="font-weight: 800; letter-spacing: -1px; margin-bottom: 5px;">Select Players
            </h2>
            <p id="selectionSubTitle" style="color: var(--text-secondary); margin-bottom: 25px; font-size: 0.9rem;">
                Choose a player to continue scoring.</p>
            <div id="selectionForm">
                <!-- Dynamic content -->
            </div>
            <div style="margin-top:30px; display: flex; gap: 10px;">
                <button class="btn-setup" style="flex: 2;" onclick="confirmSelection()">Confirm Selection</button>
                <button class="btn-setup"
                    style="flex: 1; background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--glass-border);"
                    onclick="closeSelectionModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Wicket Modal -->
    <div id="wicketModal" class="modal">
        <div class="modal-content">
            <h2>Wicket Out!</h2>
            <div class="form-group">
                <label>Who got out?</label>
                <select id="outBatsmanSelect" class="form-control">
                    <option value="striker">Striker</option>
                    <option value="nonStriker">Non-Striker</option>
                </select>
            </div>
            <div class="form-group">
                <label>Dismissal Type</label>
                <select id="dismissalType" class="form-control" onchange="toggleDismissalFields()">
                    <option value="Bowled">Bowled</option>
                    <option value="Caught">Caught</option>
                    <option value="LBW">LBW</option>
                    <option value="Run Out">Run Out</option>
                    <option value="Stumped">Stumped</option>
                    <option value="Hit Wicket">Hit Wicket</option>
                </select>
            </div>
            <div class="form-group" id="fielderGroup" style="display:none;">
                <label id="fielderLabel">Fielder</label>
                <select id="fielderSelect" class="form-control"></select>
            </div>
            <div style="display:flex; gap: 10px; margin-top:20px;">
                <button class="btn-setup" style="flex:1;" onclick="submitWicket()">Record Wicket</button>
                <button class="btn-setup" style="flex:1; background:#333; color:#fff;"
                    onclick="closeWicketModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/scoring.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
