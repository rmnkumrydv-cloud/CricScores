<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="../index.html">CricScores</a></div>
        <div class="nav-links">
            <a href="teams.html">My Teams</a>
            <a href="../dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="border-bottom: 2px solid var(--primary-color); padding-bottom: 10px;">Tournaments</h2>
            <button id="createTournamentBtn" class="btn btn-primary">Host Tournament</button>
        </div>

        <!-- Create Tournament Form -->
        <div id="createTournamentFormContainer" class="form-container"
            style="display: none; margin: 0 auto 40px auto; max-width: 600px;">
            <h3 style="margin-bottom: 20px; color: var(--primary-color);">Host New Tournament</h3>
            <form id="createTournamentForm">
                <div class="form-group">
                    <label for="tourneyName">Tournament Name</label>
                    <input type="text" id="tourneyName" required>
                </div>
                <div class="form-group">
                    <label for="organizer">Organizer</label>
                    <input type="text" id="organizer" required>
                </div>
                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="endDate">End Date</label>
                        <input type="date" id="endDate" required>
                    </div>
                </div>
                <!-- Team selection will be added in details page for simplicity -->
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Create Tournament</button>
                    <button type="button" id="cancelTourneyBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>

        <div id="tournamentsGrid" class="dashboard-grid">
            <!-- Tournaments loaded here -->
            <p style="color: var(--text-secondary);">Loading tournaments...</p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/tournaments.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
