<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Details - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="../index.html">CricScores</a></div>
        <div class="nav-links">
            <a href="discover.html">Explore</a>
            <a href="teams.html">My Teams</a>
            <a href="../dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container animate-fade" style="margin-top: 40px; position: relative;">
        <a href="teams.html" class="back-btn" title="Back to Teams" style="position: absolute; left: -50px; top: 0;">&#8592;</a>
        <div id="teamHeader" class="glass" style="margin-bottom: 30px; padding: 30px; border-radius: 20px;">
            <!-- Team info loaded here -->
            <p>Loading...</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Players</h3>
            <div>
                <button id="addPlayerBtn" class="btn btn-primary">Add Player</button>
                <button id="deleteTeamBtn" class="btn" style="background: var(--error-color); color: white; display: none;">Delete Team</button>
            </div>
        </div>

        <!-- Add Player Form -->
        <div id="addPlayerFormContainer" class="form-container glass"
            style="display: none; margin: 0 auto 40px auto; max-width: 600px; border-radius: 20px;">
            <h3 style="margin-bottom: 20px; color: var(--primary-color); font-weight: 700;">Add New Player</h3>
            <form id="addPlayerForm">
                <div class="form-group">
                    <label for="playerSelect">Select Registered Player</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="playerSelect" required style="flex: 1; padding: 10px; background: #2C2C2C; color: white; border: 1px solid #333; border-radius: 5px;">
                            <option value="">Loading players...</option>
                        </select>
                        <a id="viewStatsLink" href="#" target="_blank" class="btn" style="display: none; background: rgba(255,255,255,0.05); padding: 8px 15px; font-size: 0.8rem; border-radius: 8px; text-decoration: none; color: white;">👁️ View Stats</a>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Add Player</button>
                    <button type="button" id="cancelPlayerBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>

        <div id="playersList" style="display: grid; gap: 15px;">
            <!-- Players loaded here -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/team-details.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
