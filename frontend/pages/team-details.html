<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Details - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo"><a href="../index.html">CricScores</a></div>
        <div class="nav-links">
            <a href="teams.html">My Teams</a>
            <a href="../dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <div id="teamHeader" style="margin-bottom: 30px;">
            <!-- Team info loaded here -->
            <p>Loading...</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Players</h3>
            <button id="addPlayerBtn" class="btn btn-primary">Add Player</button>
        </div>

        <!-- Add Player Form -->
        <div id="addPlayerFormContainer" class="form-container"
            style="display: none; margin: 0 auto 40px auto; max-width: 600px;">
            <h3 style="margin-bottom: 20px; color: var(--primary-color);">Add New Player</h3>
            <form id="addPlayerForm">
                <div class="form-group">
                    <label for="playerName">Player Name</label>
                    <input type="text" id="playerName" required>
                </div>
                <div class="form-group">
                    <label for="playerRole">Role</label>
                    <select id="playerRole"
                        style="width: 100%; padding: 10px; background: #2C2C2C; color: white; border: 1px solid #333; border-radius: 5px;">
                        <option value="Batsman">Batsman</option>
                        <option value="Bowler">Bowler</option>
                        <option value="All-rounder" selected>All-rounder</option>
                        <option value="Wicketkeeper">Wicketkeeper</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="battingStyle">Batting Style</label>
                    <select id="battingStyle"
                        style="width: 100%; padding: 10px; background: #2C2C2C; color: white; border: 1px solid #333; border-radius: 5px;">
                        <option value="Right-hand bat">Right-hand bat</option>
                        <option value="Left-hand bat">Left-hand bat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bowlingStyle">Bowling Style</label>
                    <select id="bowlingStyle"
                        style="width: 100%; padding: 10px; background: #2C2C2C; color: white; border: 1px solid #333; border-radius: 5px;">
                        <option value="None">None</option>
                        <option value="Right-arm fast">Right-arm fast</option>
                        <option value="Right-arm medium">Right-arm medium</option>
                        <option value="Right-arm spin">Right-arm spin</option>
                        <option value="Left-arm fast">Left-arm fast</option>
                        <option value="Left-arm spin">Left-arm spin</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Add Player</button>
                    <button type="button" id="cancelPlayerBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>

        <div id="playersList" style="display: grid; gap: 15px;">
            <!-- Players loaded here -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/team-details.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
