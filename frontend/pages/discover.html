<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .search-container {
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        .search-input input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .search-input i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .filter-tab {
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .filter-tab.active {
            background: var(--primary-color);
            color: white;
        }
        .discover-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .match-card {
            transition: transform 0.3s ease;
        }
        .match-card:hover {
            transform: translateY(-5px);
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-live { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; }
        .status-scheduled { background: rgba(255, 171, 0, 0.2); color: #ffab00; }
        .status-completed { background: rgba(0, 200, 83, 0.2); color: #00c853; }
    </style>
    <script src="../js/theme.js"></script>
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-content container">
            <a href="../dashboard.html" class="logo">Cric<span>Scores</span></a>
            <div class="nav-links">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme" style="background:transparent;border:none;color:var(--text-primary);cursor:pointer;padding:5px;display:flex;align-items:center;transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 50%; opacity: 0.8;"></button>
                <a href="../dashboard.html">Dashboard</a>
                <a href="leaderboard.html">Leaderboard</a>
                <div class="user-profile" onclick="window.location.href='profile.html'">
                    <img id="navProfilePic" src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile">
                    <span id="navUserName">Loading...</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container animate-fade" style="margin-top: 40px;">
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
            <a href="../dashboard.html" class="btn-icon" style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 50%; min-width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none;">←</a>
            <h1 style="font-weight: 900; font-size: 2.8rem; margin: 0; letter-spacing: -2px; color: var(--primary-color);">Explore <span>Cricket</span></h1>
        </div>

        <div class="search-container">
            <div class="search-input">
                <i style="font-style: normal; display:inline-flex; align-items:center; justify-content:center;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </i>
                <input type="text" id="searchInput" placeholder="Search by venue or tournament name...">
            </div>
        </div>

        <div class="filter-tabs">
            <div class="filter-tab active" onclick="setFilter('matches')">Matches</div>
            <div class="filter-tab" onclick="setFilter('tournaments')">Tournaments</div>
        </div>

        <div id="resultsGrid" class="discover-grid">
            <!-- Results will be loaded here -->
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/discover.js"></script>
</body>
</html>
