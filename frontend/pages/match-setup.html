<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Setup - CricScores</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .setup-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 40px;
            background: var(--background-card);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .team-section {
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .player-list {
            height: 350px;
            overflow-y: auto;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: var(--transition);
        }

        .player-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .player-item:last-child {
            border-bottom: none;
        }

        .counter {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 12px;
            font-weight: 600;
        }

        .counter.valid {
            color: var(--primary-color);
        }

        .btn-setup {
            width: 100%;
            margin-top: 30px;
            padding: 18px;
            background: var(--primary-color);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-setup:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            transform: none !important;
        }

        .header-setup {
            text-align: left;
            margin-bottom: 40px;
        }

        .header-setup h2 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .header-setup p {
            color: var(--text-secondary);
        }
    </style>
</head>

<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-content container">
            <a href="../index.html" class="logo">Cric<span>Scores</span></a>
            <div class="nav-links">
                <a href="../umpire-dashboard.html">Dashboard</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container animate-fade" style="margin-top: 40px;">
        <div class="setup-container" style="position: relative;">
            <a href="../dashboard.html" class="back-btn" title="Back to Dashboard" style="position: absolute; left: -60px; top: 0;">←</a>
            <div class="header-setup">
                <h2>Match Setup</h2>
                <p>Initialize your professional match. Ensure 11 players per team.</p>
            </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div>
                <label style="color: #aaa; display: block; margin-bottom: 5px;">Tournament (Optional)</label>
                <select id="tournamentSelect" class="form-control" style="width: 100%;">
                    <option value="">Friendly Match (No Tournament)</option>
                </select>
            </div>
            <div>
                <label style="color: #aaa; display: block; margin-bottom: 5px;">Total Overs</label>
                <input type="number" id="oversInput" class="form-control" value="20" min="1" max="50"
                    style="width: 100%;">
            </div>
        </div>

        <div class="teams-grid">
            <!-- Team 1 -->
            <div class="team-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0;">Team A</h3>
                    <a href="#" onclick="toggleAll(1); return false;" id="team1SelectAll"
                        style="font-size: 0.85em; color: var(--primary-color); text-decoration: none; display: none;">Select
                        All</a>
                </div>
                <select id="team1Select" class="form-control" style="width: 100%; margin-bottom: 10px;">
                    <option value="">Select Team</option>
                </select>
                <div id="team1Players" class="player-list">
                    <p style="text-align: center; color: #555; margin-top: 20px;">Select a team first</p>
                </div>
                <div id="team1Counter" class="counter">Players selected: 0/11</div>
            </div>

            <!-- Team 2 -->
            <div class="team-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0;">Team B</h3>
                    <a href="#" onclick="toggleAll(2); return false;" id="team2SelectAll"
                        style="font-size: 0.85em; color: var(--primary-color); text-decoration: none; display: none;">Select
                        All</a>
                </div>
                <select id="team2Select" class="form-control" style="width: 100%; margin-bottom: 10px;">
                    <option value="">Select Team</option>
                </select>
                <div id="team2Players" class="player-list">
                    <p style="text-align: center; color: #555; margin-top: 20px;">Select a team first</p>
                </div>
                <div id="team2Counter" class="counter">Players selected: 0/11</div>
            </div>
        </div>

        <button id="startSetupBtn" class="btn-setup" disabled>Proceed to Toss</button>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/match-setup.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
