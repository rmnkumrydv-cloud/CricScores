<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricScores - Professional Cricket Scoring</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">CricScores</div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="pages/login.html" class="btn btn-secondary">Login</a>
            <a href="pages/register.html" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>CricScores</h1>
            <p>Experience professional-grade cricket scoring, tournament management, and detailed analytics. Join existing tournaments or start your own league today.</p>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a href="pages/register.html" class="btn btn-primary">Get Started</a>
                <a href="#features" class="btn btn-secondary">Learn More</a>
            </div>
        </div>
    </section>

    <script src="js/api.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        const navLinks = document.getElementById('navLinks');

        if (user) {
            navLinks.innerHTML = `
                <a href="dashboard.html">Dashboard</a>
                <a href="#" onclick="logout()">Logout</a>
                <div style="width: 40px; height: 40px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold;">
                    ${user.name.charAt(0).toUpperCase()}
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.reload();
        }
    </script>
</body>
</html>
